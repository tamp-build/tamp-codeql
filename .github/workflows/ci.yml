name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: build & test (${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    env:
      DOTNET_NOLOGO: '1'
      DOTNET_CLI_TELEMETRY_OPTOUT: '1'
      DOTNET_SKIP_FIRST_TIME_EXPERIENCE: '1'
      TampCoreMode: package

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      # CodeQL bundle ships the CLI + the standard library packs. The
      # full bundle is ~500MB; we use the slim CLI-only release for CI
      # since integration tests only exercise --help / resolve / version.
      - name: Install CodeQL CLI (Linux)
        if: runner.os == 'Linux'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo github/codeql-cli-binaries v2.20.7 --pattern "codeql-linux64.zip" --dir /tmp
          unzip -q /tmp/codeql-linux64.zip -d /tmp
          echo "/tmp/codeql" >> "$GITHUB_PATH"
          /tmp/codeql/codeql version

      - name: Install CodeQL CLI (macOS)
        if: runner.os == 'macOS'
        shell: bash
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo github/codeql-cli-binaries v2.20.7 --pattern "codeql-osx64.zip" --dir /tmp
          unzip -q /tmp/codeql-osx64.zip -d /tmp
          echo "/tmp/codeql" >> "$GITHUB_PATH"
          /tmp/codeql/codeql version

      - name: Install CodeQL CLI (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release download --repo github/codeql-cli-binaries v2.20.7 --pattern "codeql-win64.zip" --dir $env:RUNNER_TEMP
          Expand-Archive -Path "$env:RUNNER_TEMP\codeql-win64.zip" -DestinationPath "$env:RUNNER_TEMP" -Force
          "$env:RUNNER_TEMP\codeql" | Out-File -FilePath $env:GITHUB_PATH -Encoding utf8 -Append
          & "$env:RUNNER_TEMP\codeql\codeql.exe" version

      - name: Install supported .NET SDKs
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: |
            8.0.x
            9.0.x
            10.0.x

      - name: Verify SDKs
        shell: bash
        run: |
          dotnet --info
          dotnet --list-sdks
          dotnet --list-runtimes

      - name: NuGet cache
        uses: actions/cache@v4
        with:
          path: ~/.nuget/packages
          key: nuget-${{ runner.os }}-${{ hashFiles('**/*.csproj', '**/Directory.Packages.props') }}
          restore-keys: |
            nuget-${{ runner.os }}-

      - name: Restore
        run: dotnet restore Tamp.CodeQL.slnx

      - name: Build
        run: dotnet build Tamp.CodeQL.slnx --no-restore --configuration Release

      - name: Test
        run: dotnet test Tamp.CodeQL.slnx --no-build --configuration Release --logger "trx;LogFileName=test-results.trx" --results-directory ./TestResults

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results-${{ matrix.os }}
          path: ./TestResults/**/*.trx
          if-no-files-found: warn
